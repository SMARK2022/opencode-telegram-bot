name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Validate release tag
        id: release
        run: |
          set -euo pipefail
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          EXPECTED_TAG="v$CURRENT_VERSION"
          if [ "$GITHUB_REF_TYPE" != "tag" ] || [ "$GITHUB_REF_NAME" != "$EXPECTED_TAG" ]; then
            echo "Release must run from tag $EXPECTED_TAG; got $GITHUB_REF_TYPE $GITHUB_REF_NAME"
            exit 1
          fi
          echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$CURRENT_VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "kind=rc" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "kind=stable" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Generate release notes
        id: notes
        run: |
          set -euo pipefail
          CURRENT_VERSION="${{ steps.release.outputs.version }}"
          RELEASE_KIND="${{ steps.release.outputs.kind }}"
          BODY_FILE="$RUNNER_TEMP/release-notes.md"
          node scripts/generate-release-notes.mjs \
            --version "$CURRENT_VERSION" \
            --kind "$RELEASE_KIND" \
            --repo "$GITHUB_REPOSITORY" \
            --output "$BODY_FILE"

          echo "body_file=$BODY_FILE" >> "$GITHUB_OUTPUT"

      - name: Pack installable artifact
        id: pack
        run: |
          set -euo pipefail
          PACK_JSON="$RUNNER_TEMP/npm-pack.json"
          npm pack --json --pack-destination "$RUNNER_TEMP" > "$PACK_JSON"
          PACK_NAME=$(node -e 'const fs=require("fs"); const data=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(data[0].filename)' "$PACK_JSON")
          PACK_PATH="$RUNNER_TEMP/$PACK_NAME"
          (cd "$RUNNER_TEMP" && sha256sum "$PACK_NAME" > "$PACK_NAME.sha256")
          echo "path=$PACK_PATH" >> "$GITHUB_OUTPUT"
          echo "checksum=$PACK_PATH.sha256" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.body_file }}
          prerelease: ${{ steps.release.outputs.prerelease == 'true' }}
          files: |
            ${{ steps.pack.outputs.path }}
            ${{ steps.pack.outputs.checksum }}
